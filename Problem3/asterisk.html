<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk HTML5</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            user-select: none;
        }

        #game-container {
            width: 600px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* The internal canvas resolution is 300x200 to match the original C# code, 
          but we scale it up to 600x400 with CSS so it's easier to see.
          image-rendering: pixelated keeps the sharp 8-bit look.
        */
        canvas {
            background-color: black;
            width: 600px;
            height: 400px;
            image-rendering: pixelated; 
            border: 2px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        button {
            background-color: #ddd;
            border: 1px solid #999;
            padding: 8px 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            margin-right: 8px;
        }

        button:hover {
            background-color: #fff;
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        .p1-color {
            color: yellow;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="row">
            <div id="lbl-level">Level 1</div>
            <div id="lbl-record">Record: Level 1 by nobody</div>
        </div>
        <div class="row">
            <div class="p1-color">Player 1: ENTER key</div>
        </div>

        <canvas id="gameCanvas" width="300" height="200"></canvas>

        <div style="text-align: center;">
            <button id="btn-start">1 Player</button>
            <button id="btn-sound">Sound: ON</button>
        </div>
    </div>

    <script>
        // Game Constants & Elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const btnStart = document.getElementById('btn-start');
        const btnSound = document.getElementById('btn-sound');
        const lblLevel = document.getElementById('lbl-level');
        const lblRecord = document.getElementById('lbl-record');

        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        const TIMER_INTERVAL = 20; // 20ms matches the original C# timer

        // Game State Variables
        let timer = null;
        let nLevel = 0;
        let nXPos = 0;
        let nYPos1 = 0;
        let isEnterDown = false;
        let isAnimating = false;
        let trailPixels = [];
        let staticObstacles = [];
        let movingObstacles = [];
        let gapY = HEIGHT / 2;
        let isCountdownActive = false;
        let soundEnabled = localStorage.getItem('Asterisk_Sound') !== 'off';
        let audioCtx = null;
        
        let nRecordLevel = parseInt(localStorage.getItem('Asterisk_Level')) || 1;
        let recordName = localStorage.getItem('Asterisk_Name') || 'nobody';

        // Initialize UI
        showRecord();
        drawBackground(); // Draw empty box before playing
        updateSoundButtonLabel();

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Enter') isEnterDown = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Enter') isEnterDown = false;
        });

        btnStart.addEventListener('click', () => {
            btnStart.disabled = true;
            nLevel = 0;
            newLevel();
            if (timer) clearInterval(timer);
            startRoundCountdown(() => {
                timer = setInterval(onTimerTick, TIMER_INTERVAL);
            });
        });

        btnSound.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            localStorage.setItem('Asterisk_Sound', soundEnabled ? 'on' : 'off');
            updateSoundButtonLabel();
            if (soundEnabled) {
                playBeep(620, 0.05, 'square', 0.04);
            }
        });

        function updateSoundButtonLabel() {
            btnSound.innerText = `Sound: ${soundEnabled ? 'ON' : 'OFF'}`;
        }

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playBeep(freq, duration, type = 'square', volume = 0.03) {
            if (!soundEnabled) return;
            const ac = getAudioContext();
            const now = ac.currentTime;
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, now);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.connect(gain);
            gain.connect(ac.destination);
            osc.start(now);
            osc.stop(now + duration + 0.01);
        }

        function showRecord() {
            localStorage.setItem('Asterisk_Level', nRecordLevel);
            localStorage.setItem('Asterisk_Name', recordName);
            lblRecord.innerText = `Record: Level ${nRecordLevel} by ${recordName}`;
        }

        // The gap on the right wall that the player must reach to complete the level
        // The gap size decreases as levels increase, but never gets smaller than 12 pixels to keep it fair
        // Connor Shepherd
        function getGap() {
            const gapSize = Math.max(12, 40 - nLevel * 2);
            return {
                start: gapY - gapSize / 2,
                end: gapY + gapSize / 2
            };
        }

        function drawBackground() {
            // Fill black background
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Draw white border walls
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, WIDTH, 1);                  // Top wall
            ctx.fillRect(0, HEIGHT - 1, WIDTH, 1);         // Bottom wall

            const { start: gapStart, end: gapEnd } = getGap();
        
            ctx.fillRect(WIDTH - 1, 0, 1, gapStart);                 // Right wall (top half)
            ctx.fillRect(WIDTH - 1, gapEnd, 1, HEIGHT - gapEnd);     // Right wall (bottom half)
        }

        function newLevel() {
            nLevel++;
            nXPos = 0;
            nYPos1 = Math.floor(HEIGHT / 2); // Start in the middle
            isEnterDown = false;
            trailPixels = [];
            // Randomize gap position each level (with padding so it's not unfair)
            // Connor Shepherd
            const margin = 25;
            gapY = Math.floor(Math.random() * (HEIGHT - margin * 2)) + margin;
            createObstaclesForLevel();
            
            lblLevel.innerText = `Level ${nLevel}`;
            drawScene();
        }

        function createObstaclesForLevel() {
            staticObstacles = [];
            movingObstacles = [];

            const nBlocks = nLevel * 5;
            for (let i = 0; i < nBlocks; i++) {
                staticObstacles.push(createObstacle(2, 2));
            }

            if (nLevel > 5) {
                const nMovingBlocks = Math.min(2 + Math.floor((nLevel - 5) / 2), 6);
                for (let i = 0; i < nMovingBlocks; i++) {
                    movingObstacles.push(createObstacle(3, 3, true));
                }
            }
        }

        function createObstacle(width, height, isMoving = false) {
            const { start: gapStart, end: gapEnd } = getGap();
            let x;
            let y;

            do {
                x = Math.floor(Math.random() * (WIDTH - width - 20)) + 10;
                y = Math.floor(Math.random() * (HEIGHT - height - 20)) + 10;
            } while (isMoving && x > WIDTH - 25 && y >= gapStart && y <= gapEnd);

            const obstacle = { x, y, width, height };

            if (isMoving) {
                obstacle.dx = Math.random() < 0.5 ? -1 : 1;
                obstacle.dy = Math.random() < 0.5 ? -1 : 1;
            }

            return obstacle;
        }

        function drawScene() {
            drawBackground();

            ctx.fillStyle = 'white';
            staticObstacles.forEach(obstacle => {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            });

            movingObstacles.forEach(obstacle => {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            });

            trailPixels.forEach(pixel => {
                ctx.fillStyle = pixel.color;
                ctx.fillRect(pixel.x, pixel.y, 1, 1);
            });
        }

        function onTimerTick() {
            nXPos++;
            
            // Enter key to rise (decrease Y), release to fall (increase Y)
            if (isEnterDown) {
                nYPos1--;
            } else {
                nYPos1++;
            }

            if (nLevel > 5) {
                updateMovingObstacles();
            }

            drawScene();
            checkPosition();
            
            // Andrew Frizzell's modification, giving our dot a rainbow trail
            if (nXPos < WIDTH) {
                // We use the X position to cycle through the 360 degrees of the hue spectrum
                const trailColor = `hsl(${nXPos % 360}, 100%, 50%)`;
                trailPixels.push({ x: nXPos, y: nYPos1, color: trailColor });
                ctx.fillStyle = trailColor;
                ctx.fillRect(nXPos, nYPos1, 1, 1);
            }
        }

        // Retro pre-round countdown drawn directly on the game canvas.
        function startRoundCountdown(onComplete) {
            isCountdownActive = true;
            const steps = ['3', '2', '1', 'GO!'];
            const stepDuration = 420;
            const totalDuration = steps.length * stepDuration;
            const startTime = performance.now();

            function drawCountdownOverlay(text, progress) {
                if (progress < 0.08) {
                    if (text === 'GO!') {
                        playBeep(820, 0.08, 'triangle', 0.05);
                    } else {
                        playBeep(520, 0.06, 'square', 0.04);
                    }
                }
                const pulse = 1 + Math.sin(progress * Math.PI) * 0.22;
                const alpha = 1 - progress * 0.35;

                drawScene();

                ctx.save();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.globalAlpha = alpha;
                ctx.shadowColor = 'white';
                ctx.shadowBlur = 6;
                ctx.fillStyle = 'white';
                ctx.font = `bold ${Math.round(26 * pulse)}px "Courier New", monospace`;
                ctx.fillText(text, WIDTH / 2, HEIGHT / 2 - 6);

                ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.9;
                ctx.font = '8px "Courier New", monospace';
                ctx.fillStyle = '#cfcfcf';
                ctx.fillText('GET READY', WIDTH / 2, HEIGHT / 2 + 12);
                ctx.restore();
            }

            function frame(now) {
                const elapsed = now - startTime;

                if (elapsed >= totalDuration) {
                    isCountdownActive = false;
                    drawScene();
                    onComplete();
                    return;
                }

                const currentStep = Math.floor(elapsed / stepDuration);
                const stepProgress = (elapsed % stepDuration) / stepDuration;
                drawCountdownOverlay(steps[currentStep], stepProgress);
                requestAnimationFrame(frame);
            }

            requestAnimationFrame(frame);
        }

        // Samuel Schroeder
        // Add moving obstacles, gradually add more as the level increases
        function updateMovingObstacles() {
            movingObstacles.forEach(obstacle => {
                obstacle.x += obstacle.dx;
                obstacle.y += obstacle.dy;

                if (obstacle.x <= 1 || obstacle.x + obstacle.width >= WIDTH - 1) {
                    obstacle.dx *= -1;
                    obstacle.x = Math.max(1, Math.min(obstacle.x, WIDTH - obstacle.width - 1));
                }

                if (obstacle.y <= 1 || obstacle.y + obstacle.height >= HEIGHT - 1) {
                    obstacle.dy *= -1;
                    obstacle.y = Math.max(1, Math.min(obstacle.y, HEIGHT - obstacle.height - 1));
                }
            });
        }
//I added a fun level complete animation that bursts colorful particles from the exit and shows a pulsing "LEVEL COMPLETE!" message before starting the next level. 
// It's a nice reward for reaching the exit and adds some visual flair to the game!
// Gabriel Kiveu
        function playLevelCompleteAnimation(callback) {
            isAnimating = true;
            playBeep(740, 0.07, 'triangle', 0.05);
            setTimeout(() => playBeep(980, 0.08, 'triangle', 0.05), 90);
            const startTime = performance.now();
            const duration = 1400; // ms

            // Particles burst from the exit gap
            const particles = [];
            const exitX = WIDTH - 2;
            const exitY = HEIGHT / 2;
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 0.5;
                particles.push({
                    x: exitX, y: exitY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    hue: Math.floor(Math.random() * 360),
                    life: 1.0
                });
            }

            function frame(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);

                // Redraw existing canvas with a semi-transparent dark overlay so trail stays visible
                ctx.fillStyle = 'rgba(0,0,0,0.18)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);

                // Animate particles
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.04; // gentle gravity
                    p.life -= 0.012;
                    if (p.life > 0) {
                        ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
                        ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
                    }
                });

                // Pulsing "LEVEL COMPLETE!" text
                const pulse = 0.7 + 0.3 * Math.sin(elapsed / 80);
                const alpha = t < 0.85 ? 1 : 1 - (t - 0.85) / 0.15; // fade out near end
                ctx.save();
                ctx.globalAlpha = alpha * pulse;
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Glow effect via multiple shadow layers
                ctx.shadowColor = `hsl(${(elapsed / 4) % 360}, 100%, 60%)`;
                ctx.shadowBlur = 8;
                ctx.fillStyle = 'white';
                ctx.fillText(`LEVEL ${nLevel} COMPLETE!`, WIDTH / 2, HEIGHT / 2 - 10);
                ctx.shadowBlur = 0;
                ctx.font = '8px "Courier New", monospace';
                ctx.globalAlpha = alpha * 0.8;
                ctx.fillStyle = '#aaa';
                ctx.fillText(`Next: Level ${nLevel + 1}`, WIDTH / 2, HEIGHT / 2 + 8);
                ctx.restore();

                if (t < 1) {
                    requestAnimationFrame(frame);
                } else {
                    isAnimating = false;
                    callback();
                }
            }

            requestAnimationFrame(frame);
        }

        function checkPosition() {
            // Level complete - swept the whole screen
            if (nXPos >= WIDTH) {
                clearInterval(timer);
                timer = null;
                playLevelCompleteAnimation(() => {
                    newLevel();
                    startRoundCountdown(() => {
                        timer = setInterval(onTimerTick, TIMER_INTERVAL);
                    });
                });
                return;
            }

            // Pixel-perfect collision detection via canvas ImageData
            // Reads the 1x1 pixel where the player is about to move
            const pixelData = ctx.getImageData(nXPos, nYPos1, 1, 1).data;
            
            // pixelData holds [R, G, B, A]. If RGB is not 0,0,0, we hit something (wall, block, or trail)
            const isBlack = (pixelData[0] === 0 && pixelData[1] === 0 && pixelData[2] === 0);

            // Additionally check if player went off bounds top/bottom just in case
            const outOfBounds = (nYPos1 < 0 || nYPos1 >= HEIGHT);

            if (!isBlack || outOfBounds) {
                crash();
            }
        }

        function crash() {
            clearInterval(timer);
            timer = null;
            playBeep(180, 0.18, 'sawtooth', 0.06);

            // Give the crash sound time to play before alert/prompt blocks the UI thread.
            setTimeout(() => {
                if (nLevel > nRecordLevel) {
                    let newName = prompt("High Score! Enter your name:", recordName);
                    if (newName !== null && newName.trim() !== "") {
                        recordName = newName.trim();
                    }
                    nRecordLevel = nLevel;
                    showRecord();
                } else {
                    alert("Game Over!");
                }
                
                btnStart.disabled = false;
            }, 230);
        }
    </script>
</body>
</html>
